    <div class="background"></div>
    <!-- main -->
    <div class="root">
        <!-- canvas -->
        <canvas class="background-canvas" width="96" height="96"></canvas>
        <!-- bg overlay -->
        <div class="bg-pattern"></div>
        <!-- dom shell -->

        <!-- loading text -->
        <div class="loading-text">
            <img class="loading-logo blink" src="./assets/logo_trans_01-nkZQDtAg.png"></img>

            <i class="fa-solid fa-circle-notch fa-spin loading-spinner"></i>

         <div class="error-container" style="display: none;">
            <i class="fa-solid fa-warning"></i>
            <span id="error-message"></span>

                <i class="fa-solid fa-times"></i>
            </div>
         </div>

        <div class="dom-shell" style="display: none;">
            <img class="logo" src="./assets/logo_trans_01-nkZQDtAg.png"></img>
            <button class="shell-btn main mute" onclick="App.handlers.shell_button(1)"></button>

            <button class="shell-btn right mute" onclick="App.handlers.shell_button(2)"></button>

    <div style="display: none;" id="download-container" class="side-container">
        <div class="side-icon">
            <i class="fa-solid fa-arrow-down"></i>
        </div>
        <span> Downloading update... </span>
    </div>

    <!-- download complete -->
    <div style="display: none;" id="download-complete-container" class="side-container">
        <div class="side-icon">
            <i class="fa-solid fa-check"></i>
        </div>
        <span> Download complete! <a href="">Refresh</a> </span>
    </div>

    <!-- cloneables -->
    <div style="display: none;" class="cloneables">
        <div class="post-container display" style="display: none;">
            <canvas width="96" height="96" class="post-canvas"></canvas>
            <div class="post-text">Post Bottom Text</div>
            <div class="post-header">Post Header</div>
            <div class="post-profile-icon"></div>
            <button class="post-close back-btn"><i class="fa-solid fa-times"></i></button>
            <button class="post-next"><i class="fa-solid fa-angle-right"></i></button>
            <button class="post-like"><i class="fa-solid fa-heart"></i></button>
        </div>

        <div class="generic-list-container display menu-animation"></div>

        <div class="generic-slider-container display">
            <div class="main-container">
                <button class="slide-action mute generic-btn stylized slide-left flex-center"> <i class="fa-solid fa-angle-left"></i> </button>
                <div class="content surface-stylized"></div>
                <button class="slide-action mute generic-btn stylized slide-right flex-center"> <i class="fa-solid fa-angle-right"></i> </button>
                
                <!-- remove later -->
                <div style="display: none;" class="additional-text surface-stylized"></div> 
                
                <div class="top-slot left surface-stylized"></div>
                <div class="top-slot right surface-stylized"></div>
            </div>
            <div class="actions-container">
                <button id="cancel-btn" class="generic-btn stylized back-btn">CANCEL</button>
                <button data-fb-keep-index id="accept-btn" class="generic-btn stylized">ACCEPT</button>
            </div>
        </div>

        <div class="generic-list-container generic-grid-container display menu-animation"></div>

        <div class="generic-empty-container display menu-animation"></div>

        <div class="generic-empty-container display webcam-container">
            <video class="webcam-video"></video>
            <button style="display: none;" id="webcam-button"></button>
            <button id="webcam-change-button">
                <i class="fa-solid fa-camera-rotate"></i>
            </button>
            <canvas style="display: none;" id="webcam-canvas"></canvas>
        </div>

        <div class="progressbar">
            <div class="progressbar-background">
                <div class="progressbar-rod">
    
                </div>
            </div>
        </div>
    </div>
