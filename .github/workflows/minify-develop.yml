name: minify-develop
run-name: Minify JS/CSS/HTML [minified-develop branch]

on: 
  workflow_dispatch:
  push:
    branches:
      - 'develop'

jobs:
  checkout-minify-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm install -g terser
      - run: npm install -g csso-cli
      - run: npm install -g html-minifier-terser

      - run: for i in ./src/*.js; do terser $i --compress -o $i; done
      - run: csso ./styles.css -o ./styles.css
      - run: html-minifier-terser --collapse-boolean-attributes --collapse-whitespace --minify-css --minify-js --minify-urls --remove-attribute-quotes --remove-comments --remove-empty-attributes --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --remove-style-link-type-attributes --remove-tag-whitespace --use-short-doctype -o index.html index.html

      - run: |
          git config user.name autosam
          git config user.email autosam.sm@gmail.com
          git commit -am '[Develop] Automated minify of ${{ github.sha }}'
          git push --force -u origin develop:minified-develop
